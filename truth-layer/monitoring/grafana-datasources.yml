apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    database: truth_analytics
    jsonData:
      user: truth_user
      password: truth_analytics_password
    secureJsonData:
      password: truth_analytics_password
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: truth_layer_logs
    jsonData:
      version: '8.11.0'
      logMessageField: message
      logLevelField: level
      timeField: '@timestamp'
    editable: true
