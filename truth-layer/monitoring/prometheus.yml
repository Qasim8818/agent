global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'truth-layer'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Truth Layer API metrics
  - job_name: 'api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3000']
        labels:
          service: 'truth-api'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ZK Engine metrics
  - job_name: 'zk-engine'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['zk-engine:8001']
        labels:
          service: 'zk-engine'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # PostgreSQL exporter (when available)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Redis exporter (when available)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
