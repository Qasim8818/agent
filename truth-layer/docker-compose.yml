version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: truth-postgres
    environment:
      POSTGRES_USER: \${POSTGRES_USER:-truth_user}
      POSTGRES_PASSWORD: \${POSTGRES_PASSWORD}
      POSTGRES_DB: \${POSTGRES_DB:-truth_layer}
      POSTGRES_INITDB_ARGS: \"-c shared_preload_libraries=pg_stat_statements\"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/migrations:/docker-entrypoint-initdb.d/02-migrations
    ports:
      - \"5432:5432\"
    healthcheck:
      test: [\"CMD-SHELL\", \"pg_isready -U truth_user -d truth_layer\"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truth_network
    restart: unless-stopped
    env_file: .env

  redis:
    image: redis:7-alpine
    container_name: truth-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - \"6379:6379\"
    healthcheck:
      test: [\"CMD\", \"redis-cli\", \"ping\"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truth_network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: truth-api
    environment:
      NODE_ENV: \${NODE_ENV:-production}
      DATABASE_URL: postgresql://\${POSTGRES_USER:-truth_user}:\${POSTGRES_PASSWORD}@postgres:5432/\${POSTGRES_DB:-truth_layer}
      REDIS_URL: \${REDIS_URL:-redis://redis:6379}
      ZK_ENGINE_URL: \${ZK_ENGINE_URL:-http://zk-engine:50051}
      ARWEAVE_NODE: \${ARWEAVE_NODE:-https://arweave.net}
      JWT_SECRET: \${JWT_SECRET}
      PORT: \${PORT:-3000}
      API_KEYS: \${API_KEYS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - \"\${PORT:-3000}:3000\"
    # REMOVED: ./api/node_modules volume mount - anti-pattern
    # REMOVED: ./api/src volume mount - use built dist
    networks:
      - truth_network
    restart: unless-stopped
    command: npm run start:prod
    env_file: .env

  # ... other services unchanged: zk-engine, prometheus, grafana, etc. (trimmed for brevity)
  zk-engine:
    build:
      context: ./zk-engine
      dockerfile: Dockerfile
    container_name: truth-zk-engine
    environment:
      RUST_LOG: info
      PROVING_KEY_PATH: /app/keys/proving_key.bin
      VERIFYING_KEY_PATH: /app/keys/verifying_key.bin
    ports:
      - \"50051:50051\"
      - \"8001:8001\"
    volumes:
      - ./zk-engine/src:/app/src
      - ./zk-engine/keys:/app/keys
    networks:
      - truth_network
    restart: unless-stopped
    command: cargo run --release

volumes:
  postgres_data:
  redis_data:

networks:
  truth_network:
    driver: bridge

