version: '3.9'

services:
  # ==================== DATABASE LAYER ====================
  postgres:
    image: postgres:16-alpine
    container_name: truth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-truth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-truth_layer}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/migrations:/docker-entrypoint-initdb.d/02-migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truth_user -d truth_layer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truth_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: truth-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truth_network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: truth-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-truth_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-truth_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_in_production}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/clickhouse-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - truth_network
    restart: unless-stopped

  # ==================== CORE SERVICES ====================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: truth-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-truth_user}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-truth_layer}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ZK_ENGINE_URL: ${ZK_ENGINE_URL:-http://zk-engine:50051}
      ARWEAVE_NODE: ${ARWEAVE_NODE:-https://arweave.net}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: ${PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/src
      - ./api/node_modules:/app/node_modules
    networks:
      - truth_network
    restart: unless-stopped
    command: npm run dev

  zk-engine:
    build:
      context: ./zk-engine
      dockerfile: Dockerfile
    container_name: truth-zk-engine
    environment:
      RUST_LOG: info
      PROVING_KEY_PATH: /app/keys/proving_key.bin
      VERIFYING_KEY_PATH: /app/keys/verifying_key.bin
    ports:
      - "50051:50051"  # gRPC
      - "8001:8001"    # Metrics
    volumes:
      - ./zk-engine/src:/app/src
      - ./zk-engine/keys:/app/keys
    networks:
      - truth_network
    restart: unless-stopped
    command: cargo run --release

  # ==================== MONITORING & LOGGING ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: truth-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - truth_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: truth-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change_me_in_production}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - truth_network
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: truth-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD:-change_me_in_production}
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - truth_network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: truth-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - truth_network
    restart: unless-stopped

  # ==================== DEVELOPMENT TOOLS ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: truth-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@truth-layer.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change_me_in_production}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - truth_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  pgadmin_data:

networks:
  truth_network:
    driver: bridge
